name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'package.json'
    tags:
      - v*

jobs:
  check-version:
    name: Check if version changed
    runs-on: ubuntu-latest
    if: github.ref_type != 'tag'
    outputs:
      version_changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version change
        id: check
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          PREVIOUS_VERSION=$(git show HEAD~1:package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version")
          echo "Current: v${CURRENT_VERSION}, Previous: v${PREVIOUS_VERSION}"
          echo "version=v${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "Version changed!"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version unchanged, skipping build."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: build and release electron app
    needs: check-version
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.ref_type == 'tag' ||
      needs.check-version.outputs.version_changed == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.12.0"

      - name: Install Dependencies
        run: npm install

      - name: Build Electron App (skip publish)
        run: npm run dist -- --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Artifacts for Windows
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          shopt -s extglob
          npx rimraf "release/*/!(*.exe)"

      - name: Cleanup Artifacts for macOS
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          shopt -s extglob
          npx rimraf "release/*/!(*.dmg)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: release

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: release/**/*
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
